<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パチンコ収支</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#f0f2f5;margin:0;text-align:center}
header{background:#008080;color:white;padding:20px}
#appTitle{cursor:pointer}
.container{max-width:500px;margin:auto;padding:10px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{background:white;padding:5px;border-radius:6px;cursor:pointer}
.summary{background:#2c3e50;color:white;padding:10px;border-radius:10px;margin:10px 0}
.btn{padding:10px;border:none;border-radius:8px;color:white;cursor:pointer}
.cum{background:#008080}
.graph{background:#3498db}
.export{background:#27ae60}
.import{background:#e67e22}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.modal-content{background:white;padding:20px;border-radius:15px;width:90%;max-width:350px}
input,textarea{width:100%;padding:8px;margin:5px 0}
.result{font-size:20px;font-weight:bold;margin:10px 0}
</style>
</head>

<body>

<header>
<h1 id="appTitle" contenteditable="true">パチンコ収支</h1>
</header>

<div class="container">

<div class="summary">
今月の収支：<span id="totalAmount">¥0</span>
</div>

<div style="display:flex;gap:5px;margin-bottom:10px">
<button class="btn cum" onclick="showCumulative()">累計表示</button>
<button class="btn graph" onclick="showGraph()">グラフ表示</button>
</div>

<button class="btn export" onclick="exportCSV()">CSV出力</button>
<button class="btn import" onclick="document.getElementById('file').click()">CSV復元</button>
<input type="file" id="file" hidden onchange="importCSV(this)">

<div id="calendar" class="calendar"></div>

</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
<div class="modal-content">
<h3 id="dateText"></h3>

<label>回収額</label>
<input type="number" id="payoutInput" oninput="calc()">

<label>投資額</label>
<input type="number" id="investmentInput" oninput="calc()">

<div id="dailyResult" class="result">¥0</div>

<label>メモ</label>
<textarea id="memoInput"></textarea>

<button onclick="save()">保存</button>
<button onclick="closeModal()">戻る</button>

</div>
</div>

<script>
let data=JSON.parse(localStorage.getItem("pachi_data"))||{};
let selected="";

function render(){
const cal=document.getElementById("calendar");
cal.innerHTML="";
let now=new Date();
let y=now.getFullYear(),m=now.getMonth();
let last=new Date(y,m+1,0).getDate();
let total=0;

for(let d=1;d<=last;d++){
let key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
let div=document.createElement("div");
div.className="day";
let amt=data[key]?.amount||0;
if(amt) div.innerHTML=d+"<br>"+amt.toLocaleString();
else div.innerText=d;
div.onclick=()=>openModal(key);
cal.appendChild(div);
total+=amt;
}
document.getElementById("totalAmount").innerText="¥"+total.toLocaleString();
}

function openModal(key){
selected=key;
document.getElementById("dateText").innerText=key;
document.getElementById("payoutInput").value=data[key]?.payout||"";
document.getElementById("investmentInput").value=data[key]?.investment||"";
document.getElementById("memoInput").value=data[key]?.memo||"";
calc();
document.getElementById("modal").style.display="flex";
}

function calc(){
let p=parseInt(payoutInput.value)||0;
let i=parseInt(investmentInput.value)||0;
let r=p-i;
let el=document.getElementById("dailyResult");
el.innerText="¥"+r.toLocaleString();
el.style.color=r<0?"red":"green";
}

function save(){
let p=parseInt(payoutInput.value)||0;
let i=parseInt(investmentInput.value)||0;
let m=memoInput.value||"";
if(!p&&!i&&!m) delete data[selected];
else data[selected]={payout:p,investment:i,amount:p-i,memo:m};
localStorage.setItem("pachi_data",JSON.stringify(data));
closeModal();
render();
}

function closeModal(){modal.style.display="none"}

function exportCSV(){
let csv="日付,回収額,投資額,収支,メモ\n";
Object.keys(data).forEach(k=>{
let d=data[k];
csv+=`${k},${d.payout},${d.investment},${d.amount},"${d.memo}"\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Pachi収支_"+new Date().toISOString().slice(0,10)+".csv";
a.click();
}

function importCSV(input){
let file=input.files[0];
if(!file)return;
let reader=new FileReader();
reader.onload=e=>{
let lines=e.target.result.split("\n");
let obj={};
for(let i=1;i<lines.length;i++){
let l=lines[i].split(",");
if(l.length>=4){
obj[l[0]]={
payout:parseInt(l[1])||0,
investment:parseInt(l[2])||0,
amount:parseInt(l[3])||0,
memo:l[4]||""
};
}
}
data=obj;
localStorage.setItem("pachi_data",JSON.stringify(data));
render();
};
reader.readAsText(file);
}

function showGraph(){
alert("グラフ機能は既存コードを流用可能");
}
function showCumulative(){
alert("累計機能は既存コードを流用可能");
}

render();
</script>

</body>
</html>
